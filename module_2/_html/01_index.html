<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic HTML</title>
  </head>
  <body>
    <!-- Text -->
    <h1>H1 tags</h1>
    <h2>H2 tags</h2>
    <h3>h3 tags</h3>
    <p>p tags</p>

    <!-- containers -->
    <div></div>
    <section></section>
    <main></main>

    <!-- Inputs -->
    <input type="text" placeholder="input tag" />
    <button>button</button>

    <!-- tags, class and ids -->
    <div id="container"></div>
    <main id="map"></main>
  </body>
</html>
